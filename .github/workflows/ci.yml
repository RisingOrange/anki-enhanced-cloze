name: tests

on:
  push:
    branches:
      - "master"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout add-on repo
        uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Run mypy
        run: uv run mypy
